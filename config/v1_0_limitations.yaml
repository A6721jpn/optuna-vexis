# =============================================================
# Production v1.0 CAD Feasibility-Gated Optimization 制限設定 (20次元)
# =============================================================

freecad:
  fcstd_path: "input/model.FCStd"
  sketch_name: "Sketch"
  surface_name: "Face"
  surface_label: "SURFACE"
  
  # 20次元パラメータ（ai-v0 SafetyPredictor対応）
  # 各パラメータは基準値に対する比率 (1.0 = 基準値)
  constraints:
    CROWN-D-L:
      min: 0.95
      max: 1.05
      base_value: 1.0
    CROWN-D-H:
      min: 0.95
      max: 1.05
      base_value: 1.0
    CROWN-W:
      min: 0.95
      max: 1.05
      base_value: 1.0
    PUSHER-D-H:
      min: 0.95
      max: 1.05
      base_value: 1.0
    PUSHER-D-L:
      min: 0.95
      max: 1.05
      base_value: 1.0
    TIP-D:
      min: 0.95
      max: 1.05
      base_value: 1.0
    STROKE-OUT:
      min: 0.95
      max: 1.05
      base_value: 1.0
    STROKE-CENTER:
      min: 0.95
      max: 1.05
      base_value: 1.0
    FOOT-W:
      min: 0.95
      max: 1.05
      base_value: 1.0
    FOOT-MID:
      min: 0.95
      max: 1.05
      base_value: 1.0
    SHOULDER-ANGLE-OUT:
      min: 0.95
      max: 1.05
      base_value: 1.0
    SHOULDER-ANGLE-IN:
      min: 0.95
      max: 1.05
      base_value: 1.0
    TOP-T:
      min: 0.95
      max: 1.05
      base_value: 1.0
    TOP-DROP:
      min: 0.95
      max: 1.05
      base_value: 1.0
    FOOT-IN:
      min: 0.95
      max: 1.05
      base_value: 1.0
    DIAMETER:
      min: 0.95
      max: 1.05
      base_value: 1.0
    HEIGHT:
      min: 0.95
      max: 1.05
      base_value: 1.0
    TIP-DROP:
      min: 0.95
      max: 1.05
      base_value: 1.0
    SHOUDER-T:
      min: 0.95
      max: 1.05
      base_value: 1.0
    FOOT-OUT:
      min: 0.95
      max: 1.05
      base_value: 1.0

  step_output_dir: "input/step"
  step_filename_template: "v1_0_trial_{trial_id}.step"
  timeout_sec: 300

cad_gate:
  # ai-v0 SafetyPredictor directory (contains model.joblib + scaler.joblib)
  model_path: "input/cad_gate_model"
  threshold: 0.5
  enabled: true

  # FeasibilityAwareSampler: 最大リトライ回数
  rejection_max_retries: 50

cae:
  stroke_range:
    min: 0.0
    max: 0.1
  solver_progress_stall_sec: 600
  solver_log_poll_sec: 1.0
  solver_error_markers:
    - "ERROR TERMINATION"
    - "FATAL ERROR"
  max_retries: 1
  stream_stdout: true
  stdout_log_dir: "output/logs/vexis"
  stdout_console_level: "INFO"

penalty:
  base_penalty: 50.0
  alpha: 10.0
  failure_weights:
    cad_infeasible: 1.0
    constraint_violation: 1.0
    cae_fail: 0.6
